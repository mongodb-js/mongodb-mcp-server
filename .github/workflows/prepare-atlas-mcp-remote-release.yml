#  Bumps the version in packages/mongodb-atlas-mcp-remote/package.json and creates a release PR.
#  Once merged, the new version will be published to npm independently from the main server.
name: Prepare atlas-mcp-remote release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact version to bump to or one of major, minor, patch"
        required: true
        default: "patch"

permissions: {}

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 # v1
      - uses: mongodb-js/devtools-shared/actions/setup-bot-token@e0a552718c3014ac4d190d9db32ae1931fc40161 # main
        id: app-token
        with:
          app-id: ${{ vars.DEVTOOLS_BOT_APP_ID }}
          private-key: ${{ secrets.DEVTOOLS_BOT_PRIVATE_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: package.json
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Bump version
        id: bump-version
        env:
          INPUTS_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          npm version "$INPUTS_VERSION" --prefix packages/mongodb-atlas-mcp-remote --no-git-tag-version --allow-same-version
          NEW_VERSION=$(npm pkg get version --prefix packages/mongodb-atlas-mcp-remote | tr -d '"')
          pnpm --filter 'mongodb-atlas-mcp-remote' run build:update-package-version
          echo "NEW_VERSION=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check version regression
        id: version-check
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_VERSION: ${{ steps.bump-version.outputs.NEW_VERSION }}
        run: |
          set -euo pipefail

          # Scoped to the wrapper's own tag prefix
          LATEST_TAG=$(gh release list --exclude-drafts --exclude-pre-releases --limit 100 --json tagName --jq '[.[] | select(.tagName | test("^mongodb-atlas-mcp-remote/v[0-9]"))] | .[0].tagName // empty')
          if [[ -z "$LATEST_TAG" ]]; then
            exit 0
          fi

          LATEST="${LATEST_TAG#mongodb-atlas-mcp-remote/v}"
          NEW="${NEW_VERSION#v}"

          if ! npx semver -r "< $NEW" "$LATEST" > /dev/null; then
            echo "VERSION_WARNING=⚠️ The new version \`${NEW_VERSION}\` is lower than the latest published release \`${LATEST_TAG}\`. Please verify this is intentional." >> "${GITHUB_OUTPUT}"
          fi

      - name: Create release PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # 8.1.1
        id: create-pr
        env:
          HUSKY: 0
        with:
          title: "chore: release mongodb-atlas-mcp-remote ${{ steps.bump-version.outputs.NEW_VERSION }}"
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: release mongodb-atlas-mcp-remote ${{ steps.bump-version.outputs.NEW_VERSION }}"
          body: |
            This PR bumps the `mongodb-atlas-mcp-remote` package version to ${{ steps.bump-version.outputs.NEW_VERSION }}.
            Once merged, the new version will be published to npm independently from the main server.

            ${{ steps.version-check.outputs.VERSION_WARNING }}
          base: main
          branch: chore_release_atlas-mcp-remote_${{ steps.bump-version.outputs.NEW_VERSION }}
          author: "${{ steps.app-token.outputs.app-slug}}[bot] <${{ steps.app-token.outputs.app-email }}>"
          committer: "${{ steps.app-token.outputs.app-slug}}[bot] <${{ steps.app-token.outputs.app-email }}>"
      - name: Set auto merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash
