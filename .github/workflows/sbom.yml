---
name: SBOM

on:
  schedule:
    # Weekly, similar to mongosh's cron-tasks.yml workflow.
    - cron: "0 3 * * 0"
  workflow_dispatch:
  ## Temporarily enable on PRs
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    name: Generate SBOM and vulnerability report
    runs-on: ubuntu-latest
    steps:
      - uses: mongodb-js/devtools-shared/actions/setup-bot-token@main
        id: app-token
        with:
          app-id: ${{ vars.DEVTOOLS_BOT_APP_ID }}
          private-key: ${{ secrets.DEVTOOLS_BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Set up Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate vulnerability report
        run: pnpm run generate-vulnerability-report
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Update third-party notices
        if: always()
        run: pnpm run update-third-party-notices

      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sbom
          path: .sbom/

      - name: Commit and push updated third-party notices
        if: always()
        env:
          GIT_AUTHOR_NAME: "${{ steps.app-token.outputs.app-slug}}[bot]"
          GIT_AUTHOR_EMAIL: "${{ steps.app-token.outputs.app-email }}"
          GIT_COMMITTER_NAME: "${{ steps.app-token.outputs.app-slug}}[bot]"
          GIT_COMMITTER_EMAIL: "${{ steps.app-token.outputs.app-email }}"
        run: |
          git add THIRD_PARTY_NOTICES.md
          git commit --no-allow-empty -m "chore: update third-party notices [skip actions]" || true
          git push
