---
name: SBOM

on:
  schedule:
    # Weekly, similar to mongosh's cron-tasks.yml workflow.
    - cron: "0 3 * * 0"
  workflow_dispatch:
  ## Temporarily enable on PRs
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    name: Generate SBOM and vulnerability report
    runs-on: ubuntu-latest
    steps:
      - uses: mongodb-js/devtools-shared/actions/setup-bot-token@04e390e1e6157b3edbc120f3d9359d3fb47ab839 # main
        id: app-token
        with:
          app-id: ${{ vars.DEVTOOLS_BOT_APP_ID }}
          private-key: ${{ secrets.DEVTOOLS_BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Set up Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # This repository is public, so workflow logs are visible to anyone. We redirect
      # all command output (stdout and stderr) so nothing about specific findings -
      # including counts - reaches the public log; only a generic pass/fail signal is
      # surfaced here. Review results directly at https://app.snyk.io if this fails.
      - name: Generate vulnerability report
        run: |
          pnpm run generate-vuilnerability-report > /dev/null 2>&1 || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Update third-party notices
        if: always()
        run: pnpm run update-third-party-notices

      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v7.0.1
        with:
          name: sbom
          # This repository is public, so uploaded artifacts are downloadable by anyone.
          # Exclude the vulnerability report and raw Snyk results, which can disclose
          # exploitable, unpatched vulnerabilities.
          path: |
            .sbom/
            !.sbom/vulnerability-report.md
            !.sbom/snyk-test-result.json

      - name: Commit and push updated third-party notices
        # Pull request runs check out a detached, unmergeable ref, so there is no
        # branch to push updates to; only commit and push on schedule/dispatch runs.
        if: always() && github.event_name != 'pull_request'
        env:
          GIT_AUTHOR_NAME: "${{ steps.app-token.outputs.app-slug}}[bot]"
          GIT_AUTHOR_EMAIL: "${{ steps.app-token.outputs.app-email }}"
          GIT_COMMITTER_NAME: "${{ steps.app-token.outputs.app-slug}}[bot]"
          GIT_COMMITTER_EMAIL: "${{ steps.app-token.outputs.app-email }}"
        run: |
          git add THIRD_PARTY_NOTICES.md
          git commit --no-allow-empty -m "chore: update third-party notices [skip actions]" || true
          git push
