---
name: Dependency Health

on:
  schedule:
    # Weekly, similar to mongosh's cron-tasks.yml workflow.
    - cron: "0 3 * * 0"
  workflow_dispatch:
  ## Temporarily enable on PRs
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    name: Scan dependencies and update notices
    runs-on: ubuntu-latest
    steps:
      - uses: mongodb-js/devtools-shared/actions/setup-bot-token@04e390e1e6157b3edbc120f3d9359d3fb47ab839 # main
        id: app-token
        with:
          app-id: ${{ vars.DEVTOOLS_BOT_APP_ID }}
          private-key: ${{ secrets.DEVTOOLS_BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Set up Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate dependency SBOM
        run: pnpm run create-dependency-sbom-lists

      - name: Run Snyk scan
        run: pnpm run snyk-test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Generate vulnerability report
        run: |
          set +e
          pnpm run generate-vulnerability-report > /dev/null 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "::error title=Vulnerabilities found::High-or-higher severity vulnerabilities were found. See the vulnerability-report artifact on ${run_url}."
            exit "$status"
          fi
        env:
          JIRA_BASE_URL: https://jira.mongodb.org
          JIRA_PROJECT: MCP
          JIRA_API_TOKEN: ${{ github.event_name != 'pull_request' && secrets.JIRA_API_TOKEN || '' }}
          # Rendered verbatim into the Jira ticket body (Jira wiki markup, not markdown).
          JIRA_VULNERABILITY_BUILD_INFO: "Detected by the [Dependency Health workflow run|${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}]."

      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v7.0.1
        with:
          name: vulnerability-report
          path: .sbom/vulnerability-report.md
          retention-days: 1

      - name: Update third-party notices
        if: always()
        run: pnpm run update-third-party-notices

      - name: Commit and push updated third-party notices
        # Pull request runs check out a detached, unmergeable ref, so there is no
        # branch to push updates to; only commit and push on schedule/dispatch runs.
        if: always() && github.event_name != 'pull_request'
        env:
          GIT_AUTHOR_NAME: "${{ steps.app-token.outputs.app-slug}}[bot]"
          GIT_AUTHOR_EMAIL: "${{ steps.app-token.outputs.app-email }}"
          GIT_COMMITTER_NAME: "${{ steps.app-token.outputs.app-slug}}[bot]"
          GIT_COMMITTER_EMAIL: "${{ steps.app-token.outputs.app-email }}"
        run: |
          git add THIRD_PARTY_NOTICES.md
          git commit --no-allow-empty -m "chore: update third-party notices [skip actions]" || true
          git push

      - name: Generate SBOM and upload to Kondukto via SilkBomb
        if: always() && github.event_name != 'pull_request'
        env:
          ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
          ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
          KONDUKTO_TOKEN: ${{ secrets.KONDUKTO_TOKEN }}
          KONDUKTO_BRANCH: ${{ github.ref_name }}
        run: |
          set -e

          echo "$ARTIFACTORY_PASSWORD" | docker login artifactory.corp.mongodb.com \
            --username "$ARTIFACTORY_USERNAME" --password-stdin

          docker pull artifactory.corp.mongodb.com/release-tools-container-registry-public-local/silkbomb:2.0

          docker run --rm -v "$PWD":/pwd \
            artifactory.corp.mongodb.com/release-tools-container-registry-public-local/silkbomb:2.0 \
            update --purls /pwd/.sbom/purls.txt --sbom-out /pwd/.sbom/sbom-lite.json

          docker run --rm -e KONDUKTO_TOKEN="$KONDUKTO_TOKEN" -v "$PWD":/pwd \
            artifactory.corp.mongodb.com/release-tools-container-registry-public-local/silkbomb:2.0 \
            augment \
            --repo ${{ github.repository }} \
            --branch "$KONDUKTO_BRANCH" \
            --sbom-in /pwd/.sbom/sbom-lite.json \
            --sbom-out /pwd/.sbom/sbom.json

      - name: Upload SBOM artifact
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v7.0.1
        with:
          name: sbom
          path: |
            .sbom/sbom.json
            .sbom/purls.txt
          if-no-files-found: ignore
          retention-days: 7
