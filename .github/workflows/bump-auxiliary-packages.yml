#  Detects changes to auxiliary packages since the last bump and creates a PR
#  with conventional-commit-based version bumps.
name: Bump auxiliary packages
on:
  workflow_dispatch:

permissions: {}

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: GitHubSecurityLab/actions-permissions/monitor@v1
      - uses: mongodb-js/devtools-shared/actions/setup-bot-token@main
        id: app-token
        with:
          app-id: ${{ vars.DEVTOOLS_BOT_APP_ID }}
          private-key: ${{ secrets.DEVTOOLS_BOT_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump package versions
        id: bump
        run: |
          output=$(pnpm run --silent bump:packages)
          echo "$output"

          if echo "$output" | grep -q "^Bumped:"; then
            summary=$(echo "$output" | grep "^Bumped:" | sed 's/^Bumped: //')
            echo "SUMMARY=${summary}" >> "$GITHUB_OUTPUT"
            echo "HAS_CHANGES=true" >> "$GITHUB_OUTPUT"
          else
            echo "HAS_CHANGES=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create bump PR
        if: steps.bump.outputs.HAS_CHANGES == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # 8.1.1
        id: create-pr
        with:
          title: "chore: bump auxiliary packages"
          token: ${{ steps.app-token.outputs.token }}
          commit-message: |
            chore: bump auxiliary packages

            ${{ steps.bump.outputs.SUMMARY }}
          body: |
            This PR bumps auxiliary package versions: ${{ steps.bump.outputs.SUMMARY }}.
            Once merged, the new versions will be published to npm.
          base: main
          branch: chore_bump_auxiliary_packages
          author: "${{ steps.app-token.outputs.app-slug}}[bot] <${{ steps.app-token.outputs.app-email }}>"
          committer: "${{ steps.app-token.outputs.app-slug}}[bot] <${{ steps.app-token.outputs.app-email }}>"
      - name: Set auto merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash
