packages:
  - "packages/*"
  - "tests/browser"
overrides:
  "mongodb": "^7.1.1"
  "kerberos": "^7.0.0"
  "bson": "^7.2.0"
  "zod": "^4.4.2"
allowBuilds:
  "@modelcontextprotocol/ext-apps": false
  braintrust: true
  core-js: false
  cpu-features: true
  esbuild: true
  kerberos: true
  macos-export-certificate-and-key: true
  mongodb-client-encryption: true
  os-dns-native: true
  protobufjs: true
  ssh2: true
  win-export-certificate-and-key: true
minimumReleaseAgeExclude:
  - mongodb-runner@6.7.13
